<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Vortex Dispatch">
  <!-- Option A — copper spiral on void. Matches night-observatory brand tokens. -->
  <rect width="32" height="32" rx="7" fill="#08080a"/>
  <circle cx="16" cy="16" r="12.2" fill="none" stroke="rgba(236,229,216,0.18)" stroke-width="0.9"/>
  <!-- logarithmic-style spiral in molten copper -->
  <path
    d="M16 16
       C 16 12.2, 19.6 12.2, 19.6 16
       C 19.6 21.4, 12.2 21.4, 12.2 15.4
       C 12.2 8.2, 21.8 8.2, 21.8 16
       C 21.8 24.6, 9.4 24.6, 9.4 15
       C 9.4 5.2, 24.6 5.2, 24.6 16"
    fill="none"
    stroke="#d08a4e"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- warm core -->
  <circle cx="16" cy="16" r="2.4" fill="#fbe4c0"/>
  <circle cx="16" cy="16" r="1.1" fill="#fff6e6"/>
</svg>
